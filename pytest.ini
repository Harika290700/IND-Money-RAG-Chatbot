[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short
markers =
    integration: run only when vector store exists (e.g. after phase1 pipeline)
    phase2: Phase 2 chat API tests
    phase3: Phase 3 scheduler tests
